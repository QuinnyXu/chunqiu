<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="经纬春秋 · 乙版徽记（经纬织纹）">
  <!-- 经（纬）平织：经线竖·青绿，纬线横·暖赭；四处交点回补纬段以成上下压织之势 -->
  <g stroke-linecap="round" stroke-width="5">
    <!-- 纬线（横·暖赭）打底 -->
    <g stroke="#B4652F"><line x1="15" y1="20" x2="49" y2="20"/><line x1="15" y1="32" x2="49" y2="32"/><line x1="15" y1="44" x2="49" y2="44"/></g>
    <!-- 经线（竖·青绿）压于其上 -->
    <g stroke="#44766B"><line x1="20" y1="15" x2="20" y2="49"/><line x1="32" y1="15" x2="32" y2="49"/><line x1="44" y1="15" x2="44" y2="49"/></g>
    <!-- 平织回压：i+j 为奇的交点让纬线复出于经线之上 -->
    <g stroke="#B4652F"><line x1="15" y1="32" x2="25" y2="32"/><line x1="27" y1="20" x2="37" y2="20"/><line x1="27" y1="44" x2="37" y2="44"/><line x1="39" y1="32" x2="49" y2="32"/></g>
  </g>
</svg>
