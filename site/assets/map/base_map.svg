<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="春秋早期黄淮下游示意底图">
  <title>春秋人物志 · 底图</title>
  <desc>覆盖东经105–122、北纬29.5–38.5；投影见 docs/conventions.md：x=(lng-105)/17*1200，y=700-(lat-29.5)/9*700。水系取春秋大势（河水走故道东北入海），列国底色仅示势力范围，非考据疆界。
  西扩（第13轮第①批，2026-07-19）：东部既有图层（海域/列国/水系/山地/标注）按仿射关系 x'=12/17*x+352.9412、y'=6.5/9*y 整体换算自旧投影（东经110–122、北纬32–38.5），几何位置不变、仅随新投影重新落点；西部秦楚新增地形与色块占位见文末 layer-*-west 空图层，绘制归 Vision（第13轮第②批）。</desc>

  <rect width="1200" height="700" fill="#F4EDDF"/>

  <!-- 海域与海岸；transform 由旧投影(110–122E,32–38.5N)仿射换算至新投影(105–122E,29.5–38.5N)，几何形状不变 -->
  <g id="layer-sea" transform="matrix(0.7058824,0,0,0.7222222,352.9412,0)">
    <path fill="#E3E6D8" vector-effect="non-scaling-stroke" d="M700 0 C760 45 830 62 880 70 C900 76 898 110 890 140 C886 158 902 170 930 166 C1010 154 1080 150 1140 165 C1180 175 1196 200 1186 225 C1160 260 1100 270 1050 280 C1000 290 965 315 950 345 C935 380 928 400 922 420 C915 460 925 500 960 540 C1000 585 1080 645 1160 690 L1200 700 L1200 0 Z"/>
    <path fill="none" stroke="#AEB69E" stroke-width="1.5" vector-effect="non-scaling-stroke" d="M700 0 C760 45 830 62 880 70 C900 76 898 110 890 140 C886 158 902 170 930 166 C1010 154 1080 150 1140 165 C1180 175 1196 200 1186 225 C1160 260 1100 270 1050 280 C1000 290 965 315 950 345 C935 380 928 400 922 420 C915 460 925 500 960 540 C1000 585 1080 645 1160 690"/>
  </g>

  <!-- 列国淡色底（示意，非考据疆界）；data-state 供首页地图导航绑定热区；transform 同上（仿射换算，几何不变） -->
  <g id="layer-states" fill-opacity="0.32" stroke="none" transform="matrix(0.7058824,0,0,0.7222222,352.9412,0)">
    <ellipse data-state="周" cx="250" cy="410" rx="92" ry="62" fill="#C9B78A"/>
    <ellipse data-state="卫" cx="480" cy="300" rx="82" ry="58" fill="#A9A0B8"/>
    <ellipse data-state="宋" cx="570" cy="440" rx="88" ry="58" fill="#C4B292"/>
    <ellipse data-state="陈" cx="490" cy="527" rx="58" ry="42" fill="#A8B79F"/>
    <ellipse data-state="蔡" cx="430" cy="572" rx="52" ry="38" fill="#B8A98F"/>
    <ellipse data-state="郑" cx="375" cy="450" rx="85" ry="62" fill="#9DB58A"/>
    <ellipse data-state="许" cx="400" cy="492" rx="40" ry="30" fill="#B5AF8C"/>
    <ellipse data-state="鲁" cx="700" cy="320" rx="88" ry="62" fill="#C79E7E"/>
    <ellipse data-state="齐" cx="830" cy="185" rx="145" ry="82" fill="#8FADB8"/>
    <ellipse data-state="纪" cx="880" cy="190" rx="45" ry="34" fill="#93B3A5"/>
    <ellipse data-state="晋" cx="172" cy="295" rx="88" ry="58" fill="#C39A99"/>
  </g>

  <!-- 水系；transform 同上（仿射换算，几何不变），vector-effect 保线宽视觉不因缩放变细 -->
  <g id="layer-rivers" fill="none" stroke="#7FA3A8" stroke-width="2" stroke-linecap="round" opacity="0.9" transform="matrix(0.7058824,0,0,0.7222222,352.9412,0)">
    <path stroke-width="3.2" vector-effect="non-scaling-stroke" d="M0 420 C120 400 240 390 360 382 C420 378 432 352 450 323 C480 275 502 268 530 237 C570 195 586 172 600 129 C612 95 655 40 682 0"/>
    <path vector-effect="non-scaling-stroke" d="M368 380 C420 390 500 378 560 366 C602 356 600 344 612 332 C640 298 672 238 702 194 C740 176 792 168 830 162 C856 158 880 146 898 130"/>
    <path vector-effect="non-scaling-stroke" d="M762 246 C732 254 692 270 654 300 C640 310 628 316 616 320"/>
    <path vector-effect="non-scaling-stroke" d="M732 306 C712 314 684 324 662 334 C656 360 670 386 690 409 C700 440 706 470 718 505 C726 532 734 562 730 600"/>
    <path vector-effect="non-scaling-stroke" d="M302 436 C332 452 342 460 352 468 C392 500 432 516 466 528 C522 550 592 600 630 634"/>
    <path stroke-width="1.5" vector-effect="non-scaling-stroke" d="M322 444 C356 456 392 468 424 476 C436 479 446 484 452 490"/>
    <path stroke-width="2.6" vector-effect="non-scaling-stroke" d="M330 656 C450 640 560 624 630 634 C666 622 700 610 728 602 C800 584 862 558 902 538 C912 532 918 510 920 484"/>
    <path vector-effect="non-scaling-stroke" d="M198 40 C188 110 170 180 160 240 C152 288 112 352 88 404"/>
  </g>

  <!-- 山地示意；transform 同上（仿射换算，几何不变） -->
  <g id="layer-mountains" fill="none" stroke="#8C8272" stroke-width="1.8" stroke-linejoin="round" transform="matrix(0.7058824,0,0,0.7222222,352.9412,0)">
    <path vector-effect="non-scaling-stroke" d="M692 252l10-14 7 9 5-7 9 12"/>
    <path vector-effect="non-scaling-stroke" d="M284 438l8-11 6 7 4-5 7 9"/>
  </g>

  <!-- 西部秦楚地形与色块（第13轮第②批·Vision，2026-07-19）：坐标直接按新投影
       x=(lng-105)/17*1200、y=700-(lat-29.5)/9*700 落笔，**不套东部仿射变换组**。
       Skipper 预留的 5 个具名空图层由此填充；整组由标注层「之前」上移至此，令古名标注压在色块与山水之上，
       叠放次序与东部一致（layer id 不变，app.js/pipeline 按 id 取用，位置无关）。走向对照真实地理大势后平滑简化。 -->
  <!-- 秦（渭水流域·关中）、楚（汉水—江淮）淡色底；色相自既有列国色系延展，fill-opacity 同 layer-states -->
  <g id="layer-states-west" fill-opacity="0.32" stroke="none">
    <ellipse data-state="秦" cx="150" cy="302" rx="118" ry="50" fill="#C2A468"/>
    <ellipse data-state="楚" cx="500" cy="590" rx="140" ry="82" fill="#6F9E86"/>
  </g>
  <!-- 秦岭：横亘渭水（北）与汉水（南）之间的东西向山脉，示意折线记号一列，风格同泰山/嵩山 -->
  <g id="layer-mountains-qinling" fill="none" stroke="#8C8272" stroke-width="1.8" stroke-linejoin="round">
    <path vector-effect="non-scaling-stroke" d="M82 376 l10 -15 7 9 6 -8 9 12 M140 375 l10 -15 7 9 6 -8 9 12 M198 376 l10 -15 7 9 6 -8 9 12 M256 375 l10 -15 7 9 6 -8 9 12 M314 376 l10 -15 7 9 6 -8 9 12 M372 375 l10 -15 7 9 6 -8 9 12 M430 376 l10 -15 7 9 6 -8 9 12"/>
  </g>
  <!-- 渭水：自西东流，经雍城一线，入河水故道于潼关一带（约352,303，接东部河水西端） -->
  <g id="layer-rivers-wei" fill="none" stroke="#7FA3A8" stroke-linecap="round" opacity="0.9">
    <path stroke-width="2.4" vector-effect="non-scaling-stroke" d="M6 334 C 60 330 118 324 170 319 C 240 312 300 307 351 303"/>
  </g>
  <!-- 汉水：自西北（汉中）向东南，经楚境，入江于汉口一带（约655,615） -->
  <g id="layer-rivers-han" fill="none" stroke="#7FA3A8" stroke-linecap="round" opacity="0.9">
    <path stroke-width="2.2" vector-effect="non-scaling-stroke" d="M118 404 C 210 436 300 470 372 486 C 430 499 470 502 501 506 C 560 540 616 582 654 614"/>
  </g>
  <!-- 江（长江）—江淮下延示意：横贯南界自西向东，纳汉水，趋海；非考据河道，示南界方向感 -->
  <g id="layer-rivers-jianghuai" fill="none" stroke="#7FA3A8" stroke-linecap="round" opacity="0.9">
    <path stroke-width="3" vector-effect="non-scaling-stroke" d="M196 665 C 330 662 440 655 508 645 C 566 636 616 626 656 615 C 758 588 858 566 940 542 C 1000 524 1050 500 1085 498"/>
  </g>

  <!-- 古名标注（今地名不入底图）；不整体套 transform（非均匀缩放会压扁字形），各文字 x/y 按同一仿射公式逐点重算，font-size 不变 -->
  <g id="layer-labels" font-family="'Songti SC','Noto Serif CJK SC','STSong','SimSun',serif">
    <g font-size="17" fill="#6E6155">
      <text data-state="周" x="523.8" y="300.4">周</text>
      <text data-state="郑" x="611.3" y="332.2">郑</text>
      <text data-state="齐" x="921.9" y="141.6">齐</text>
      <text data-state="鲁" x="838.6" y="238.3">鲁</text>
      <text data-state="卫" x="684.7" y="222.4">卫</text>
      <text data-state="宋" x="748.2" y="323.6">宋</text>
      <text data-state="陈" x="692.5" y="385.7">陈</text>
      <text data-state="蔡" x="650.8" y="418.9">蔡</text>
      <text data-state="纪" x="968.5" y="144.4">纪</text>
      <text data-state="许" x="629.6" y="361.1">许</text>
      <text data-state="晋" x="463.1" y="210.9">晋</text>
      <text data-state="秦" x="108" y="305">秦</text>
      <text data-state="楚" x="486" y="586">楚</text>
    </g>
    <g font-size="12" fill="#8A8072">
      <text x="704.5" y="182.0">河水</text>
      <text x="238" y="300">渭水</text>
      <text x="188" y="398">秦岭</text>
      <text x="404" y="486">汉水</text>
      <text x="726" y="582">江水</text>
      <text x="810.4" y="189.2">济水</text>
      <text x="838.6" y="203.7">汶水</text>
      <text x="842.8" y="339.4">泗水</text>
      <text x="667.8" y="372.7">颍水</text>
      <text x="842.8" y="450.7">淮水</text>
      <text x="468.7" y="128.6">汾水</text>
      <text x="864.0" y="171.9">泰山</text>
      <text x="568.9" y="309.1">嵩山</text>
    </g>
  </g>

  <!-- （第13轮第①批 Skipper 预留的 5 个西部空图层，已由第②批 Vision 上移填充于「古名标注」之前，
       见上方 layer-states-west / layer-mountains-qinling / layer-rivers-wei|han|jianghuai；此处不再重复。） -->

  <!-- 城邑锚点：由 app.js 按 places.json 经纬度投影后动态填充；投影常数变更后自动生效，本文件无需改动 -->
  <g id="layer-anchors"></g>
</svg>
